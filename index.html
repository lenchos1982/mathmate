<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMate - 小学数学AI答疑</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6C5CE7">
    <style>
        :root {
            /* 糖果蓝色系 Sweet Blue */
            --primary: #5DADE2;      /* 糖果蓝 */
            --primary-light: #AED6F1; /* 浅蓝 */
            --secondary: #F7DC6F;     /* 糖果黄 */
            --success: #7BED9F;       /* 薄荷绿 */
            --error: #FF7675;         /* 珊瑚红 */
            --text: #2C3E50;
            --text-light: #7F8C8D;
            --bg: #F0F8FF;            /* 淡蓝背景 */
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(93, 173, 226, 0.15);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--white);
            position: relative;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 20px;
            text-align: center;
            color: var(--white);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .page {
            display: none;
            padding: 20px;
            min-height: calc(100vh - 80px);
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: var(--white);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }

        #camera video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #capturedImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .progress-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .progress-step {
            flex: 1;
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            transition: background 0.3s;
        }

        .progress-step.active {
            background: var(--primary);
        }

        .progress-step.completed {
            background: var(--success);
        }

        .messages {
            max-height: 40vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.ai {
            flex-direction: row;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: var(--primary-light);
        }

        .message.user .message-avatar {
            background: var(--secondary);
        }

        .message-content {
            background: #F0F0F0;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: calc(100% - 50px);
            line-height: 1.5;
        }

        .message.ai .message-content {
            border-bottom-left-radius: 4px;
            background: linear-gradient(135deg, #f0f0ff 0%, #e8e8ff 100%);
        }

        .message.user .message-content {
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, var(--secondary) 0%, #ffeaa7 100%);
        }

        .voice-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: var(--white);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .voice-btn.listening {
            background: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 50px;
            font-size: 16px;
        }

        .input-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .tip {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .tip.info {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .problem-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .problem-display h3 {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .problem-display p {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
        }

        .step-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow);
        }

        .step-card.completed {
            border-left-color: var(--success);
        }

        .step-card.active {
            border-left-color: var(--secondary);
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            margin-right: 8px;
        }

        .step-card.completed .step-number {
            background: var(--success);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #F8F9FA;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .weakness-item {
            background: #FFF5F5;
            border: 1px solid #FED7D7;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .weakness-item h4 {
            color: var(--error);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .weakness-item p {
            font-size: 13px;
            color: var(--text-light);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #F0F0F0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: var(--white);
        }

        .hidden {
            display: none !important;
        }

        .ocr-text {
            background: #F8F9FA;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            min-height: 100px;
        }

        .welcome-card {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 16px;
            background: var(--white);
            border: 2px solid #E0E0E0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .action-btn .icon {
            font-size: 32px;
        }

        .action-btn span {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        /* Toast 提示组件 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 80%;
            text-align: center;
            word-wrap: break-word;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: rgba(46, 204, 113, 0.9);
        }

        .toast.error {
            background: rgba(231, 76, 60, 0.9);
        }

        .toast.info {
            background: rgba(52, 152, 219, 0.9);
        }

        /* 骨架屏 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 16px;
            margin-bottom: 8px;
        }

        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 12px;
        }

        /* 错题本页面 */
        .wrong-item {
            background: #FFF5F5;
            border: 1px solid #FED7D7;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wrong-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }

        .wrong-item .problem {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .wrong-item .meta {
            font-size: 12px;
            color: var(--text-light);
        }

        .wrong-item .error-count {
            color: var(--error);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1><span class="icon">🧮</span> MathMate</h1>
        </div>

        <!-- Home Page -->
        <div id="page-home" class="page active">
            <div class="card welcome-card">
                <div class="welcome-icon">🎓</div>
                <h2 style="margin-bottom: 12px;">欢迎来到 MathMate</h2>
                <p style="color: var(--text-light);">小学数学AI答疑小助手</p>
                
                <div class="action-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="action-btn" onclick="showManualInput()">
                        <span class="icon">✏️</span>
                        <span>手动输入</span>
                    </div>
                    <div class="action-btn" onclick="showPage('settings')">
                        <span class="icon">⚙️</span>
                        <span>设置</span>
                    </div>
                    <div class="action-btn" onclick="showWeaknessReport()">
                        <span class="icon">📊</span>
                        <span>学习报告</span>
                    </div>
                    <div class="action-btn" onclick="showWrongAnswers()">
                        <span class="icon">📝</span>
                        <span>错题本</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wrong Answers Page -->
        <div id="page-wrong" class="page">
            <div class="card">
                <h2 style="margin-bottom: 20px;">📝 错题本</h2>
                <div id="wrongAnswersList"></div>
            </div>
            <button class="btn btn-outline" onclick="goHome()">← 返回首页</button>
        </div>

        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 20px;">⚙️ 设置</h2>
                
                <div class="form-group">
                    <label>🤖 AI 大模型</label>
                    <select id="modelSelect">
                        <option value="deepseek">DeepSeek</option>
                        <option value="qwen-cn">阿里百炼-中国版（通义千问）</option>
                        <option value="qwen-intl">阿里百炼-国际版（新加坡）</option>
                        <option value="douyin">火山引擎（豆包）</option>
                        <option value="minimax">MiniMax</option>
                        <option value="zhipu">智谱</option>
                        <option value="moonshot">Moonshot（月之暗面/Kimi）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔑 API Key</label>
                    <input type="password" id="apiKey" placeholder="请输入你的 API Key">
                </div>

                <input type="hidden" id="apiUrl" value="https://api.deepseek.com/v1">

                <div class="tip info" style="margin-bottom: 16px;">
                    💡 什么是API Key？调用AI服务的"身份证"，在对应AI平台注册后获取
                </div>

                <div class="form-group">
                    <label>🌐 语种选择</label>
                    <select id="languageSelect">
                        <option value="zh-CN">简体中文</option>
                        <option value="zh-TW">中文繁体</option>
                    </select>
                </div>

                <div class="btn-row">
                    <button class="btn btn-outline" onclick="goHome()">← 返回首页</button>
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
                
                <div class="tip info" style="margin-top: 20px;">
                    💡 提示：API Key 保存在本地浏览器中
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">🎤 语音设置</h3>
                <div class="form-group">
                    <label>声音选择</label>
                    <select id="voiceSelect">
                        <option value="">使用默认声音</option>
                    </select>
                </div>
                <button class="btn btn-outline" onclick="testVoice()">测试语音</button>
            </div>
        </div>

        <!-- Input Page -->
        <div id="page-input" class="page">
            <div class="card">
                <h3 style="margin-bottom: 12px;">✏️ 输入题目</h3>
                <div class="form-group">
                    <textarea id="manualInput" placeholder="请输入数学题目..." style="min-height: 150px;"></textarea>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startAnalysis()">开始分析 ✨</button>
            <button class="btn btn-outline" style="margin-top: 10px;" onclick="goHome()">← 返回首页</button>
        </div>

        <!-- Analysis Page -->
        <div id="page-analysis" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
            </div>

            <div class="problem-display">
                <h3>📝 题目</h3>
                <p id="problemText">...</p>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">💡 题目解析</h3>
                <div id="analysisContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p style="margin-top: 12px; color: var(--text-light);">正在分析题目，请稍候...</p>
                    </div>
                </div>
            </div>

            <button class="btn btn-outline" style="margin-top: 10px;" onclick="goHome()">← 返回首页</button>
        </div>

        <!-- Guidance Page -->
        <div id="page-guidance" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
            </div>

            <div class="problem-display">
                <h3>📝 题目</h3>
                <p id="guidanceProblemText">...</p>
            </div>

            <div id="stepsContainer">
                <!-- Steps will be dynamically added -->
            </div>

            <div id="chatSection">
                <div class="messages" id="messages"></div>
                
                <!-- 文本输入框 -->
                <div class="input-row" style="margin-top: 12px;">
                    <input type="text" id="textInput" placeholder="在这里输入你的想法或答案..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary" style="width: auto; padding: 12px 20px;" onclick="sendUserMessage()">发送</button>
                </div>
                
                <div style="text-align: center; margin-top: 12px;">
                    <button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">
                        🎤
                    </button>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="goHome()">← 首页</button>
            </div>
        </div>

        <!-- Summary Page -->
        <div id="page-summary" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
            </div>

            <div class="card" style="text-align: center;">
                <div style="font-size: 60px; margin-bottom: 16px;">🎉</div>
                <h2 style="margin-bottom: 16px;">太棒了！</h2>
                <p style="color: var(--text-light);">你完成了一道数学题！</p>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 16px;">📚 今天学到什么？</h3>
                <div id="summaryContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="showWeaknessReport()">查看薄弱点报告 →</button>
        </div>

        <!-- Weakness Report Page -->
        <div id="page-weakness" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px;">📊 薄弱点报告</h2>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalProblems">0</div>
                        <div class="stat-label">完成题目</div>
                    </div>
                    <div class="stat-item">

    <script>
        // ========== Prompt 常量 ==========
        // 【OPTIMIZATION-1】阶段1：分析题目 - 需要替换为 ANALYSIS_PROMPT_V2，增加JSON输出格式
        const ANALYSIS_PROMPT = `你是小学数学老师。分析这道题：
- 提取已知数
- 提取关键词（如"比...多"、"合计"）

只列出要点，禁止给出计算方法或答案。`;

        // 【OPTIMIZATION-2】阶段2：引导对话 - 需要替换为分层Prompt（低年级/高年级）
        // 当前问题：未分年级、追问逻辑简单、缺少认知诊断
        const GUIDANCE_PROMPT = `你是小学数学老师，用苏格拉底方法引导孩子思考。

核心原则：
- 不直接给答案，只给提示
- 孩子回答错了不要让他重来，继续给提示引导他想到正确答案
- 一步步引导，直到孩子说出正确答案

规则：
1. 孩子回答对了 → 表扬并问"想想下一步？"
2. 孩子回答接近了 → 给小提示帮助想到正确答案

要求：

- 每次只给一个小提示
- 语气亲切鼓励，适合小学生
- 不超过30字`;

        // ========== Toast 提示组件 ==========
        let toastTimer = null;
        function showToast(message, type = 'info') {
            // 移除已存在的 toast
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }
            if (toastTimer) {
                clearTimeout(toastTimer);
            }

            // 创建 toast 元素
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            // 显示动画
            setTimeout(() => toast.classList.add('show'), 10);

            // 3秒后自动消失
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ========== Global State ==========
        const state = {
            apiKey: '',
            apiUrl: '',
            model: 'deepseek',
            language: 'zh-CN',  // 默认简体中文

            // 【OPTIMIZATION-6】状态管理 - 需要添加年级设置和学习状态跟踪
            // 建议添加：grade, learningState等字段
            errorCount: 0,  // 连续错误计数
            userAnswers: [],
            sessionData: {
                problems: [],
                knowledgePoints: [],
                errors: [],
                wrongAnswers: []  // 错题本

        // ========== Navigation ==========
        function showPage(pageId) {

        // ========== Settings ==========
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('mathmate_settings') || '{}');
            state.apiKey = settings.apiKey || '';
            state.model = settings.model || 'deepseek';
            state.language = settings.language || 'zh-CN';

            const selectedModelName = document.getElementById('modelSelect').options[document.getElementById('modelSelect').selectedIndex].text;

        // 语言映射表
        const translations = {

        // 应用语言设置到界面
        function applyLanguage(lang) {
            // 直接刷新页面，利用页面加载时应用语言
            if (lang === 'zh-TW') {
                // 将语言标记存到sessionStorage，页面加载时自动应用
                sessionStorage.setItem('pendingLanguage', 'zh-TW');
            } else {
                sessionStorage.removeItem('pendingLanguage');
            }
            location.reload();
        }

        // 页面加载时自动应用待定的语言设置
        function initLanguage() {
            const pendingLang = sessionStorage.getItem('pendingLanguage');
            if (pendingLang === 'zh-TW') {
                // 替换页面中的简体文字为繁体
                const trans = translations['zh-TW'];
                const walker = document.createTreeWalker(
                    document.body,
                    NodeFilter.SHOW_TEXT,
                    null,
                    false
                );
                let node;
                while (node = walker.nextNode()) {
                    const text = node.textContent;
                    let newText = text;
                    for (const [cn, tw] of Object.entries(trans)) {
                        newText = newText.replace(new RegExp(cn, 'g'), tw);
                    }
                    if (newText !== text) {
                        node.textContent = newText;
                    }
                }
                sessionStorage.removeItem('pendingLanguage');
            }
        }

        // 页面加载完成后初始化语言
        window.addEventListener('load', initLanguage);

        document.getElementById('modelSelect').addEventListener('change', function() {
            // API端点自动切换逻辑

        // 加载设置时，根据模型设置正确的URL
        function updateApiUrlForModel(model) {
            const urls = {
                deepseek: 'https://api.deepseek.com/v1',
                'qwen-cn': 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',

        // ========== Voice (TTS & STT) ==========
        let voices = [];
        
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '<option value="">使用默认声音</option>';
            
            voices.forEach((voice, i) => {
                if (voice.lang.includes('zh')) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    select.appendChild(option);
                }
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speak(text) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            
            const voiceIndex = document.getElementById('voiceSelect').value;
            if (voiceIndex && voices[voiceIndex]) {
                utterance.voice = voices[voiceIndex];
            } else {
                const preferredVoice = voices.find(v => 
                    v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao')
                );
                if (preferredVoice) utterance.voice = preferredVoice;
            }
            
            speechSynthesis.speak(utterance);
        }

        function testVoice() {
            speak('你好！我是MathMate，很高兴认识你！');
        }

        // Speech Recognition
        let recognition = null;
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('textInput').value = transcript;
                handleUserAnswer(transcript);
            };
            
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                document.getElementById('voiceBtn').classList.remove('listening');
            };
            
            recognition.onend = function() {
                document.getElementById('voiceBtn').classList.remove('listening');
            };
        }

        function startVoice() {
            if (recognition) {
                document.getElementById('voiceBtn').classList.add('listening');
                recognition.start();
            } else {
                showToast('您的浏览器不支持语音识别功能', 'error');
            }
        }

        function stopVoice() {
            if (recognition) {
                recognition.stop();
            }
        }

        // ========== Manual Input ==========
        function showManualInput() {
            // 直接显示输入页面，不需要切换tab
            showPage('input');
        }

        // ========== Analysis & AI ==========
        function startAnalysis() {
            // 检查API设置
            if (!state.apiKey) {
                showToast('请先在设置中填写API Key并保存！', 'error');
                showPage('settings');
                return;
            }
            
            // Get problem text - 只读取手动输入框
            const manualInput = document.getElementById('manualInput');
            
            // 读取手动输入框的内容
            if (manualInput && manualInput.value && manualInput.value.trim().length >= 2) {
                state.problemText = manualInput.value.trim();
            }
            
            // 清理题目文本，去除可能的无效内容
            let cleanedProblem = state.problemText.trim();
            // 检查是否为空或者只包含无效字符
            if (!cleanedProblem || cleanedProblem === '-' || cleanedProblem.length < 2 || 
                cleanedProblem.includes('请') || cleanedProblem.includes('识别') || 
                cleanedProblem.includes('正在')) {
                showToast('请先输入题目', 'error');
                return;
            }
            state.problemText = cleanedProblem;
            
            // 先跳转到分析页面，显示加载提示
            showPage('analysis');
            console.log('显示题目:', state.problemText);
            document.getElementById('problemText').textContent = state.problemText;
            
            // 显示骨架屏加载状态
            document.getElementById('analysisContent').innerHTML = `
                <div class="skeleton-container">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text" style="width: 90%"></div>
                    <div class="skeleton skeleton-text" style="width: 75%"></div>
                    <div class="skeleton skeleton-text" style="width: 85%"></div>
                    <div class="skeleton skeleton-text" style="width: 60%"></div>
                    <p style="margin-top: 16px; color: var(--text-light); text-align: center;">🤔 AI 正在分析题目...</p>
                </div>
            `;
            
            // 调用AI分析
            analyzeWithAI(state.problemText).then(() => {
                // 分析完成后显示结果和"开始解答"按钮，不自动跳转
                document.getElementById('analysisContent').innerHTML = `
                    <div style="line-height: 1.8;">
                        ${state.analysis}
                    </div>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="startGuidanceFromAnalysis()">
                        开始解答 →
                    </button>
                `;
            }).catch(err => {
                console.error('分析失败:', err);
                showToast('分析失败: ' + (err.message || '请检查API设置'), 'error');
                document.getElementById('analysisContent').innerHTML = `
                    <div class="tip" style="background: #ffebee; color: #c62828;">
                        分析失败: ${err.message || '请检查API设置'}
                    </div>
                `;
            });
        }

        async function analyzeWithAI(problem) {
            // 精简提示词，加快响应
            const prompt = `你是小学数学老师。分析这道题：
1.已知数 2.关键词 3.用什么运算

题目：${problem}`;

            try {
                const response = await callAI(prompt);
                state.analysis = response;
                
                // 更新分析内容显示
                document.getElementById('analysisContent').innerHTML = `
                    <div style="line-height: 1.8; white-space: pre-wrap;">${response}</div>
                `;
                
                speak(response);
                return response;
            } catch (err) {
                console.error('AI调用详细错误:', err);
                const errMsg = err.message || '未知错误';
                throw new Error('AI调用失败: ' + errMsg);
            }
        }

        // callAI支持两种调用方式：
        // 1. callAI(prompt) - 简单模式，自动添加默认system prompt
        // 2. callAI(prompt, systemPrompt) - 指定system prompt
        // 3. callAI(messages) - 完整模式，messages数组
        async function callAI(promptOrMessages, systemPrompt) {
            // 判断输入类型
            let messages;
            if (Array.isArray(promptOrMessages)) {
                // 完整messages格式
                messages = promptOrMessages;
            } else {
                // 使用传入的system prompt或默认的GUIDANCE_PROMPT
                const sysPrompt = systemPrompt || GUIDANCE_PROMPT;
                messages = [
                    { role: 'system', content: sysPrompt },
                    { role: 'user', content: promptOrMessages }
                ];
            }
            
            // 不同模型有不同的配置
            const modelConfigs = {
                deepseek: { 
                    name: 'deepseek-chat', 
                    body: { model: 'deepseek-chat', messages: messages, temperature: 0.7 }
                },
                'qwen-cn': { 
                    name: 'qwen-plus', 
                    body: { model: 'qwen-plus', messages: messages, temperature: 0.7 }
                },
                'qwen-intl': { 
                    name: 'qwen-plus', 
                    body: { model: 'qwen-plus', messages: messages, temperature: 0.7 }
                },
                douyin: { 
                    name: 'doubao-pro-32k', 
                    body: { model: 'doubao-pro-32k', messages: messages, temperature: 0.7 }
                },
                minimax: { 
                    name: 'abab6.5s-chat', 
                    body: { model: 'abab6.5s-chat', messages: messages, temperature: 0.7 }
                },
                zhipu: { 
                    name: 'glm-4-flash', 
                    body: { model: 'glm-4-flash', messages: messages, temperature: 0.7 }
                },
                moonshot: { 
                    name: 'moonshot-v1-8k', 
                    body: { model: 'moonshot-v1-8k', messages: messages, temperature: 0.7 }
                }
            };
            
            const config = modelConfigs[state.model] || modelConfigs.deepseek;
            console.log('===== AI调用信息 =====');
            console.log('模型ID:', state.model);
            console.log('API URL:', state.apiUrl);
            console.log('API Key:', state.apiKey ? state.apiKey.slice(0,10) + '...' : 'empty');
            console.log('请求体:', JSON.stringify(config.body));
            
            // 只在analysis页面显示加载状态，不影响guidance页面
            const analysisContent = document.getElementById('analysisContent');
            if (analysisContent && !analysisContent.classList.contains('hidden')) {
                analysisContent.innerHTML = `
                    <div style="font-size:12px; color:#666; text-align:left;">
                    <p>模型: ${state.model}</p>
                    <p>URL: ${state.apiUrl}</p>
                    <p>Key: ${state.apiKey ? '已设置' : '未设置'}</p>
                    </div>
                    <div class="loading"><div class="spinner"></div></div>
                `;
            }
            
            // 添加超时处理（30秒）
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('AI响应超时，请重试')), 30000)
            );
            
            // 直接调用API（如果失败再试代理），带超时
            let apiEndpoint = state.apiUrl;
            
            let response;
            try {
                // 创建fetch promise并添加超时
                const fetchPromise = fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                                apiKey: state.apiKey,
                                model: config.body.model,
                                messages: config.body.messages,
                                apiUrl: state.apiUrl
                            })
                });
                
                // 竞态处理：谁先完成用谁
                response = await Promise.race([fetchPromise, timeoutPromise]);
            } catch (fetchErr) {
                console.error('直接调用失败:', fetchErr);
                // 尝试用多个CORS代理
                const corsProxies = [
                    'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiEndpoint),
                    'https://corsproxy.io/?' + encodeURIComponent(apiEndpoint)
                ];
                
                let proxySuccess = false;
                for (const proxy of corsProxies) {
                    try {
                        console.log('尝试代理:', proxy);
                        response = await fetch(proxy, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${state.apiKey}`
                            },
                            body: JSON.stringify({
                                apiKey: state.apiKey,
                                model: config.body.model,
                                messages: config.body.messages,
                                apiUrl: state.apiUrl
                            })
                        });
                        proxySuccess = true;
                        break;
                    } catch (e) {
                        console.log('代理失败:', e.message);
                    }
                }
                
                if (!proxySuccess) {
                    // 最后尝试Vercel代理
                    try {
                        response = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                prompt: prompt,
                                apiKey: state.apiKey,
                                model: config.body.model,
                                apiUrl: state.apiUrl
                            })
                        });
                    } catch (proxyErr) {
                        throw new Error('网络请求失败: ' + fetchErr.message);
                    }
                }
            }
            
            let data;
            try {
                const text = await response.text();
                console.log('原始响应状态:', response.status, response.statusText);
                console.log('原始响应:', text.substring(0, 500));
                if (!text || text.trim() === '') {
                    throw new Error('响应为空，状态码: ' + response.status);
                }
                data = JSON.parse(text);
            } catch (jsonErr) {
                console.error('JSON解析错误:', jsonErr.message);
                console.error('响应状态:', response.status);
                console.error('响应状态文本:', response.statusText);
                throw new Error('响应解析失败: ' + response.status + ' ' + response.statusText);
            }
            console.log('AI响应:', data);
            
            // 通用解析 - 尝试多种响应格式
            // 0. 先检查是否有错误
            if (data.error) {
                const errMsg = data.error.message || JSON.stringify(data.error);
                console.error('API返回错误:', errMsg);
                throw new Error('AI错误: ' + errMsg);
            }

        function submitStepAnswer() {
            const input = document.getElementById('stepInput');
            const answer = input.value.trim();
            if (!answer) return;
            
            const currentStep = state.guidanceSteps[state.currentStep];
            
            // 存储用户答案
            state.userAnswers[state.currentStep] = answer;
            
            addMessage('user', answer);
            
            // 对于开放式问题（步骤1-3），只要用户写了东西就算对
            // 只有步骤4（验证）需要检查答案
            let isCorrect = true;
            if (currentStep.type === 'step4_verify') {
                // 验证步骤：检查是否说"对"或包含正确判断
                const correctAnswer = currentStep.answer || '对';
                isCorrect = checkAnswer(answer, correctAnswer);
            }
            
            if (isCorrect || answer.length > 0) {
                // 答对：重置错误计数
                state.errorCount = 0;
                
                // 步骤完成提示
                let successMsg = '🎉 真棒！我们来看下一步～';
                if (currentStep.type === 'step4_verify') {
                    successMsg = '🎉 太棒了！题目完成！';
                }
                
                showToast(successMsg, 'success');
                speak(currentStep.type === 'step4_verify' ? '太棒了，题目完成！' : '答对了！');
                
                // 答对：跳转到下一步
                setTimeout(() => {
                    nextStep();
                }, 1000);
            } else {
                // 答错：增加错误计数
                state.errorCount++;
                
                // 检查是否连续错3次，触发选择题
                if (state.errorCount >= 3) {
                    // 保存到错题本
                    const wrongItem = {
                        problem: state.problemText,
                        step: currentStep,
                        errorCount: state.errorCount,
                        timestamp: Date.now()
                    };
                    // 检查是否已存在
                    const exists = state.sessionData.wrongAnswers.some(w => w.problem === wrongItem.problem);
                    if (!exists) {
                        state.sessionData.wrongAnswers.push(wrongItem);
                        saveSession();
                    }
                    showMultipleChoice(currentStep);
                } else {
                    showToast(`不对哦，再试一次！💪 (还剩${3 - state.errorCount}次机会)`, 'error');
                    speak('再想想看，给你一点点提示');
                    
                    // 答错后：清空输入框，重新渲染当前步骤，让用户重新填写
                    setTimeout(() => {
                        // 清空输入框
                        const newInput = document.getElementById('stepInput');
                        if (newInput) newInput.value = '';
                        
                        // 重新渲染当前步骤
                        renderGuidanceSteps();
                        
                        // 给用户焦点
                        const inputEl = document.getElementById('stepInput');
                        if (inputEl) inputEl.focus();
                    }, 500);
                }
            }

        // 【OPTIMIZATION-3】显示选择题（连续错3次时触发）- 需要改为AI动态生成高质量选项
        // 当前问题：选项随机生成，干扰项不反映真实错误类型
        function showMultipleChoice(currentStep) {
            // 生成3个选项（1个正确+2个干扰）
            const correctAnswer = currentStep.answer || '65';
            const num = parseInt(correctAnswer) || 0;
            const options = [
                { text: String(num), correct: true },
                { text: String(num + Math.floor(Math.random() * 20) + 5), correct: false },
                { text: String(Math.max(0, num - Math.floor(Math.random() * 15) - 3)), correct: false }
            ];
            // 打乱选项顺序
            options.sort(() => Math.random() - 0.5);
            
            const optionsHtml = options.map((opt, i) => 
                `<button onclick="selectOption(${opt.correct})" style="display:block;width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:16px;cursor:pointer;">${String.fromCharCode(65+i)}. ${opt.text}</button>`
            ).join('');
            
            const choiceHtml = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;">

                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', choiceHtml);
        }
        
        // 选择题选项回调
        window.selectOption = function(isCorrect) {
            // 移除弹窗
            document.body.lastElementChild.remove();
            state.errorCount = 0;  // 重置计数
            
            if (isCorrect) {
                showToast('🎉 答对了！继续加油～', 'success');
                speak('答对了！');
                setTimeout(() => nextStep(), 1000);
            } else {
                showToast('再想想哦～', 'info');
                speak('再想想看');
            }
        };

        function checkAnswer(userAnswer, correctAnswer) {
            // 清理答案，去掉空格和特殊字符
            const clean = (s) => s.replace(/[\s　，。、？！]/g, '').toLowerCase();
            const user = clean(userAnswer);
            const correct = clean(correctAnswer);
            
            // 完全匹配
            if (user === correct) return true;
            
            // 数字匹配
            const userNum = user.match(/\d+/g);
            const correctNum = correct.match(/\d+/g);
            if (userNum && correctNum && userNum[0] === correctNum[0]) return true;
            
            return false;
        }

        // 简繁转换函数
        function toTraditionalChinese(text) {
            const trans = translations['zh-TW'] || {};
            let result = text;
            for (const [cn, tw] of Object.entries(trans)) {
                result = result.replace(new RegExp(cn, 'g'), tw);
            }
            return result;
        }

        function getHint() {
            const currentStep = state.guidanceSteps[state.currentStep];
            state.hintLevel++;
            
            let hint = currentStep.fillBlank + '...';
            if (state.hintLevel > 1) {
                hint = '想想看，' + currentStep.answer.slice(0, 2) + '后面是多少？';
            }
            
            addMessage('ai', `💡 提示：${hint}`);
            speak(hint);

        function nextStep() {
            state.currentStep++;
            state.hintLevel = 0;
            
            if (state.currentStep >= state.guidanceSteps.length) {
                finishGuidance();
                return;
            }
            
            renderGuidanceSteps();
            
            const nextStepData = state.guidanceSteps[state.currentStep];
            if (nextStepData.type === 'known') {
                const itemsList = nextStepData.items.map((item, i) => `${i+1}. ${item}`).join('\n');
                addMessage('ai', `直接已知条件：\n${itemsList}`);
            } else if (nextStepData.type === 'derive') {
                addMessage('ai', `👉 ${nextStepData.question}\n\n请填空：${nextStepData.fillBlank}`);
                speak(nextStepData.question.replace('？', ''));
            } else {
                addMessage('ai', `👉 ${nextStepData.question}\n\n请填空：${nextStepData.fillBlank}`);
                speak('最后一步了，' + nextStepData.question.replace('？', ''));
            }
        }

        function skipStep() {
            const currentStep = state.guidanceSteps[state.currentStep];
            if (currentStep && currentStep.answer) {
                state.userAnswers[state.currentStep] = currentStep.answer;

            return points.length > 0 ? points : ['数学思维'];

        // ========== 增强的智能回复 - 包含计算验证 ==========
        // 【OPTIMIZATION-4】需要优化追问逻辑，减少无效追问，增加追问决策树
        // 当前问题：追问过于频繁，缺少追问冷却机制
        async function getSmartResponse(userInput) {
            // 先检查用户是否给出了答案或算式
            const hasNumber = /\d+/.test(userInput);
            const hasOperator = /[+\-×*÷=]/.test(userInput);
            
            // 如果用户给出了算式或答案，进行计算验证
            if (hasNumber && problemAnalysis && (hasOperator || userInput.includes('答案') || userInput.includes('等于'))) {
                const validationResult = await validateAnswer(userInput);
                if (validationResult.isValidAnswer || validationResult.isValidFormula) {
                    // 用户给出了正确答案或正确算式
                    const feedback = validationResult.isValidAnswer && validationResult.isValidFormula 
                        ? '完全正确！列式和计算都对！' 
                        : validationResult.isValidFormula 
                            ? '列式对的！但计算再检查一下~' 
                            : '答案对了！列式再想想？';
                    
                    return {
                        message: `🎉 ${feedback}\n\n${validationResult.isValidAnswer && validationResult.isValidFormula ? '太棒了！你完全做对了！🎊' : '再仔细算一算哦~'} `,
                        isComplete: validationResult.isValidAnswer && validationResult.isValidFormula,
                        feedback: validationResult.isValidAnswer && validationResult.isValidFormula ? 'positive' : 'hint'
                    };
                }
            }
            
            // 继续使用AI进行对话式引导
            const context = conversationHistory.slice(-4).map(m => 
                `${m.role === 'user' ? '孩子' : '老师'}: ${m.content}`
            ).join('\n');
            
            const prompt = `你是一个小学数学老师，正在通过对话引导孩子解题。

题目：${state.problemText}
题目分析：${JSON.stringify(problemAnalysis || {})}

对话历史：
${context}

孩子刚才说：${userInput}

请根据孩子的话，给出合适的回复。要求：
1. 如果孩子说对了 → 大力鼓励，简洁指出对在哪

        // ========== 计算验证 - 检查列式和计算是否正确 ==========
        // 【OPTIMIZATION-5】需要添加分层验证策略（低年级/高年级）
        // 当前问题：验证过于简单，缺少结构化验证步骤
        async function validateAnswer(userInput) {
            if (!problemAnalysis) return { isValidAnswer: false, isValidFormula: false };
            
            const correctAnswer = problemAnalysis.correctAnswer || '';
            const correctFormula = problemAnalysis.formula || '';
            
            // 提取用户给出的数字和算式
            const userNumbers = userInput.match(/\d+/g) || [];
            const correctNumbers = correctAnswer.match(/\d+/g) || [];
            const formulaNumbers = correctFormula ? correctFormula.match(/\d+/g) || [] : [];
            
            // 检查答案数字是否匹配
            let isValidAnswer = false;
            if (userNumbers.length > 0 && correctNumbers.length > 0) {
                // 检查是否包含所有正确的数字
                const hasAllCorrectNumbers = correctNumbers.every(n => userNumbers.includes(n));
                // 检查数字顺序是否合理
                isValidAnswer = hasAllCorrectNumbers && userNumbers.length >= correctNumbers.length * 0.5;
            }
            
            // 检查算式是否正确
            let isValidFormula = false;
            if (correctFormula && userInput.includes('=')) {
                // 提取等式两边的表达式
                const userExpr = userInput.split('=')[0].trim();
                const correctExpr = correctFormula.split('=')[0].trim();
                
                // 简化比较：检查数字和运算符
                const userOps = userInput.replace(/[\d\s]/g, '');
                const correctOps = correctFormula.replace(/[\d\s]/g, '');
                
                // 检查是否使用了正确的运算符
                const opMatch = (userOps.replace(/[^\+\-\*×÷]/g, '') === correctOps.replace(/[^\+\-\*×÷]/g, ''));
                
                // 检查数字是否都包含
                const hasFormulaNumbers = formulaNumbers.every(n => userNumbers.includes(n));
                
                isValidFormula = opMatch && hasFormulaNumbers;
                
                // 如果有算式，尝试计算验证
                if (isValidFormula) {
                    try {
                        // 简单计算验证（只支持基本运算）
                        const userCalc = evalSimpleExpression(userExpr);
                        const correctCalc = evalSimpleExpression(correctExpr);
                        if (userCalc !== null && correctCalc !== null) {
                            isValidFormula = userCalc === correctCalc;
                        }
                    } catch (e) {
                        console.log('计算验证跳过:', e.message);
                    }
                }
            }
            
            // 也检查纯数字答案
            if (!isValidAnswer && userNumbers.length === 1 && correctNumbers.length === 1) {
                isValidAnswer = userNumbers[0] === correctNumbers[0];
            }
            
            return { isValidAnswer, isValidFormula };
        }

        // 简单的表达式计算器（支持加减乘除）
        function evalSimpleExpression(expr) {
            try {
                // 替换中文运算符
                let e = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/／/g, '/');
                // 只允许数字和运算符
                if (!/^[\d\s\+\-\*\/\(\)\.]+$/.test(e)) return null;
                // 安全计算
                return Function('"use strict";return (' + e + ')')();
            } catch {
                return null;
            }
        }
