<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMate - 小学数学AI答疑</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6C5CE7">
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --secondary: #FDCB6E;
            --success: #00B894;
            --error: #E17055;
            --text: #2D3436;
            --text-light: #636E72;
            --bg: #F8F9FA;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--white);
            position: relative;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 20px;
            text-align: center;
            color: var(--white);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .page {
            display: none;
            padding: 20px;
            min-height: calc(100vh - 80px);
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: var(--white);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }

        #camera video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #capturedImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .progress-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .progress-step {
            flex: 1;
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            transition: background 0.3s;
        }

        .progress-step.active {
            background: var(--primary);
        }

        .progress-step.completed {
            background: var(--success);
        }

        .messages {
            max-height: 40vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.ai {
            flex-direction: row;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: var(--primary-light);
        }

        .message.user .message-avatar {
            background: var(--secondary);
        }

        .message-content {
            background: #F0F0F0;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: calc(100% - 50px);
            line-height: 1.5;
        }

        .message.ai .message-content {
            border-bottom-left-radius: 4px;
            background: linear-gradient(135deg, #f0f0ff 0%, #e8e8ff 100%);
        }

        .message.user .message-content {
            border-bottom-right-radius: 4px;
            background: linear-gradient(135deg, var(--secondary) 0%, #ffeaa7 100%);
        }

        .voice-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: var(--white);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .voice-btn.listening {
            background: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 50px;
            font-size: 16px;
        }

        .input-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .tip {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .tip.info {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .problem-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .problem-display h3 {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .problem-display p {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
        }

        .step-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow);
        }

        .step-card.completed {
            border-left-color: var(--success);
        }

        .step-card.active {
            border-left-color: var(--secondary);
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: var(--white);
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            margin-right: 8px;
        }

        .step-card.completed .step-number {
            background: var(--success);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #F8F9FA;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .weakness-item {
            background: #FFF5F5;
            border: 1px solid #FED7D7;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .weakness-item h4 {
            color: var(--error);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .weakness-item p {
            font-size: 13px;
            color: var(--text-light);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E0E0E0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #F0F0F0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: var(--white);
        }

        .hidden {
            display: none !important;
        }

        .ocr-text {
            background: #F8F9FA;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            min-height: 100px;
        }

        .welcome-card {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 16px;
            background: var(--white);
            border: 2px solid #E0E0E0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .action-btn .icon {
            font-size: 32px;
        }

        .action-btn span {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1><span class="icon">🧮</span> MathMate</h1>
        </div>

        <!-- Home Page -->
        <div id="page-home" class="page active">
            <div class="card welcome-card">
                <div class="welcome-icon">🎓</div>
                <h2 style="margin-bottom: 12px;">欢迎来到 MathMate</h2>
                <p style="color: var(--text-light);">小学数学AI答疑小助手</p>
                
                <div class="action-grid">
                    <div class="action-btn" onclick="startCamera()">
                        <span class="icon">📷</span>
                        <span>拍照识题</span>
                    </div>
                    <div class="action-btn" onclick="showManualInput()">
                        <span class="icon">✏️</span>
                        <span>手动输入</span>
                    </div>
                    <div class="action-btn" onclick="showPage('settings')">
                        <span class="icon">⚙️</span>
                        <span>设置</span>
                    </div>
                    <div class="action-btn" onclick="showWeaknessReport()">
                        <span class="icon">📊</span>
                        <span>学习报告</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="card">
                <h2 style="margin-bottom: 20px; font-size: 20px;">⚙️ 设置</h2>
                
                <div class="form-group">
                    <label>🤖 AI 大模型</label>
                    <select id="modelSelect">
                        <option value="deepseek">DeepSeek</option>
                        <option value="openai">OpenAI</option>
                        <option value="qwen">阿里通义 (Qwen)</option>
                        <option value="custom">自定义 API</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔑 API Key</label>
                    <input type="password" id="apiKey" placeholder="请输入你的 API Key">
                </div>

                <div class="form-group" id="apiUrlGroup" style="display: none;">
                    <label>🌐 API 地址</label>
                    <input type="text" id="apiUrl" placeholder="https://api.deepseek.com/v1">
                </div>

                <div class="form-group">
                    <label>📷 百度 OCR API Key（可选）</label>
                    <input type="text" id="baiduApiKey" placeholder="百度OCR AK">
                </div>

                <div class="form-group">
                    <label>🔐 百度 OCR Secret Key</label>
                    <input type="password" id="baiduSecretKey" placeholder="百度OCR SK">
                </div>

                <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                
                <div class="tip info" style="margin-top: 20px;">
                    💡 提示：API Key 保存在本地浏览器中
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">🎤 语音设置</h3>
                <div class="form-group">
                    <label>声音选择</label>
                    <select id="voiceSelect">
                        <option value="">使用默认声音</option>
                    </select>
                </div>
                <button class="btn btn-outline" onclick="testVoice()">测试语音</button>
            </div>
        </div>

        <!-- Camera Page -->
        <div id="page-camera" class="page">
            <div class="camera-container" id="cameraContainer">
                <video id="camera" autoplay playsinline></video>
                <img id="capturedImage" alt="已拍摄">
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="captureBtn" onclick="capturePhoto()">📷 拍照</button>
                <button class="btn btn-secondary hidden" id="retakeBtn" onclick="retakePhoto()">🔄 重拍</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-success hidden" id="confirmBtn" onclick="confirmPhoto()">✅ 确认</button>
            </div>

            <div class="tip info" style="margin-top: 20px;">
                📸 将数学题目对准摄像头，点击拍照
            </div>
        </div>

        <!-- Input/OCR Page -->
        <div id="page-input" class="page">
            <div class="tabs">
                <button class="tab active" id="ocrTabBtn" onclick="switchInputTab('ocr')">📷 识别结果</button>
                <button class="tab" id="manualTabBtn" onclick="switchInputTab('manual')">✏️ 手动输入</button>
            </div>

            <div id="ocrSection">
                <div class="card">
                    <h3 style="margin-bottom: 12px;">🔍 识别结果</h3>
                    <div id="ocrResult" class="ocr-text">正在识别...</div>
                </div>
            </div>

            <div id="manualSection" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom: 12px;">✏️ 输入题目</h3>
                    <div class="form-group">
                        <textarea id="manualInput" placeholder="请输入数学题目..."></textarea>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startAnalysis()">开始分析 ✨</button>
        </div>

        <!-- Analysis Page -->
        <div id="page-analysis" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
            </div>

            <div class="problem-display">
                <h3>📝 题目</h3>
                <p id="problemText">...</p>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">💡 题目解析</h3>
                <div id="analysisContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startGuidance()">开始答题引导 →</button>
        </div>

        <!-- Guidance Page -->
        <div id="page-guidance" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
                <div class="progress-step"></div>
            </div>

            <div class="problem-display">
                <h3>📝 题目</h3>
                <p id="guidanceProblemText">...</p>
            </div>

            <div id="stepsContainer">
                <!-- Steps will be dynamically added -->
            </div>

            <div id="chatSection">
                <div class="messages" id="messages"></div>
                
                <div style="text-align: center;">
                    <button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">
                        🎤
                    </button>
                </div>
                
                <div class="input-row">
                    <input type="text" id="textInput" placeholder="请说出你的答案...">
                    <button class="btn btn-primary" style="width: auto; padding: 12px 20px;" onclick="submitTextAnswer()">发送</button>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="getHint()">💡 给提示</button>
                <button class="btn btn-primary" onclick="nextStep()">下一题 →</button>
            </div>
        </div>

        <!-- Summary Page -->
        <div id="page-summary" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step active"></div>
                <div class="progress-step"></div>
            </div>

            <div class="card" style="text-align: center;">
                <div style="font-size: 60px; margin-bottom: 16px;">🎉</div>
                <h2 style="margin-bottom: 16px;">太棒了！</h2>
                <p style="color: var(--text-light);">你完成了一道数学题！</p>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 16px;">📚 今天学到什么？</h3>
                <div id="summaryContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="showWeaknessReport()">查看薄弱点报告 →</button>
        </div>

        <!-- Weakness Report Page -->
        <div id="page-weakness" class="page">
            <div class="progress-bar">
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-step completed"></div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px;">📊 薄弱点报告</h2>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalProblems">0</div>
                        <div class="stat-label">完成题目</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="correctRate">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>

                <h3 style="margin: 20px 0 12px;">🔍 涉及的知识点</h3>
                <div id="knowledgePoints"></div>

                <h3 style="margin: 20px 0 12px;">💪 继续加油</h3>
                <div id="suggestions"></div>
            </div>

            <button class="btn btn-primary" onclick="goHome()">返回首页 🔁</button>
        </div>
    </div>

    <script>
        // ========== Global State ==========
        const state = {
            apiKey: '',
            apiUrl: '',
            model: 'deepseek',
            baiduApiKey: '',
            baiduSecretKey: '',
            capturedImage: null,
            problemText: '',
            analysis: null,
            guidanceSteps: [],
            currentStep: 0,
            hintLevel: 0,
            sessionData: {
                problems: [],
                knowledgePoints: [],
                errors: []
            }
        };

        // ========== Initialization ==========
        window.onload = function() {
            loadSettings();
        };

        // ========== Navigation ==========
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
        }

        function goHome() {
            showPage('home');
        }

        // ========== Settings ==========
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('mathmate_settings') || '{}');
            state.apiKey = settings.apiKey || '';
            state.apiUrl = settings.apiUrl || 'https://api.deepseek.com/v1';
            state.model = settings.model || 'deepseek';
            state.baiduApiKey = settings.baiduApiKey || '';
            state.baiduSecretKey = settings.baiduSecretKey || '';
            
            document.getElementById('apiKey').value = state.apiKey;
            document.getElementById('apiUrl').value = state.apiUrl;
            document.getElementById('modelSelect').value = state.model;
            document.getElementById('baiduApiKey').value = state.baiduApiKey;
            document.getElementById('baiduSecretKey').value = state.baiduSecretKey;
            
            if (state.model === 'custom') {
                document.getElementById('apiUrlGroup').style.display = 'block';
            }
            
            loadVoices();
        }

        function saveSettings() {
            state.apiKey = document.getElementById('apiKey').value;
            state.apiUrl = document.getElementById('apiUrl').value || 'https://api.deepseek.com/v1';
            state.model = document.getElementById('modelSelect').value;
            state.baiduApiKey = document.getElementById('baiduApiKey').value;
            state.baiduSecretKey = document.getElementById('baiduSecretKey').value;
            
            localStorage.setItem('mathmate_settings', JSON.stringify({
                apiKey: state.apiKey,
                apiUrl: state.apiUrl,
                model: state.model,
                baiduApiKey: state.baiduApiKey,
                baiduSecretKey: state.baiduSecretKey
            }));
            
            alert('设置已保存！');
        }

        document.getElementById('modelSelect').addEventListener('change', function() {
            const group = document.getElementById('apiUrlGroup');
            if (this.value === 'custom') {
                group.style.display = 'block';
            } else {
                group.style.display = 'none';
                const urls = {
                    deepseek: 'https://api.deepseek.com/v1',
                    openai: 'https://api.openai.com/v1',
                    qwen: 'https://dashscope.aliyuncs.com/compatible-mode/v1'
                };
                document.getElementById('apiUrl').value = urls[this.value] || '';
            }
        });

        // ========== Voice (TTS & STT) ==========
        let voices = [];
        
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '<option value="">使用默认声音</option>';
            
            voices.forEach((voice, i) => {
                if (voice.lang.includes('zh')) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    select.appendChild(option);
                }
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speak(text) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            
            const voiceIndex = document.getElementById('voiceSelect').value;
            if (voiceIndex && voices[voiceIndex]) {
                utterance.voice = voices[voiceIndex];
            } else {
                const preferredVoice = voices.find(v => 
                    v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao')
                );
                if (preferredVoice) utterance.voice = preferredVoice;
            }
            
            speechSynthesis.speak(utterance);
        }

        function testVoice() {
            speak('你好！我是MathMate，很高兴认识你！');
        }

        // Speech Recognition
        let recognition = null;
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('textInput').value = transcript;
                handleUserAnswer(transcript);
            };
            
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                document.getElementById('voiceBtn').classList.remove('listening');
            };
            
            recognition.onend = function() {
                document.getElementById('voiceBtn').classList.remove('listening');
            };
        }

        function startVoice() {
            if (recognition) {
                document.getElementById('voiceBtn').classList.add('listening');
                recognition.start();
            } else {
                alert('您的浏览器不支持语音识别功能');
            }
        }

        function stopVoice() {
            if (recognition) {
                recognition.stop();
            }
        }

        // ========== Camera ==========
        async function startCamera() {
            if (!state.apiKey) {
                alert('请先在设置中填写 API Key');
                showPage('settings');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                document.getElementById('camera').srcObject = stream;
                showPage('camera');
            } catch (err) {
                console.error('摄像头错误:', err);
                alert('无法访问摄像头，请确保已授权');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('camera');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            state.capturedImage = canvas.toDataURL('image/jpeg');
            const capturedImage = document.getElementById('capturedImage');
            capturedImage.src = state.capturedImage;
            capturedImage.style.display = 'block';
            video.style.display = 'none';
            
            document.getElementById('captureBtn').classList.add('hidden');
            document.getElementById('retakeBtn').classList.remove('hidden');
            document.getElementById('confirmBtn').classList.remove('hidden');
            
            video.srcObject.getTracks().forEach(track => track.stop());
        }

        function retakePhoto() {
            startCamera();
            document.getElementById('capturedImage').style.display = 'none';
            document.getElementById('camera').style.display = 'block';
            document.getElementById('captureBtn').classList.remove('hidden');
            document.getElementById('retakeBtn').classList.add('hidden');
            document.getElementById('confirmBtn').classList.add('hidden');
        }

        function confirmPhoto() {
            runOCR(state.capturedImage);
        }

        function showManualInput() {
            if (!state.apiKey) {
                alert('请先在设置中填写 API Key');
                showPage('settings');
                return;
            }
            
            switchInputTab('manual');
            showPage('input');
        }

        // ========== OCR ==========
        async function runOCR(imageData) {
            showPage('input');
            document.getElementById('ocrResult').innerHTML = '正在识别...';
            
            if (state.baiduApiKey && state.baiduSecretKey) {
                try {
                    // Get Baidu access token
                    const tokenResp = await fetch(`https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${state.baiduApiKey}&client_secret=${state.baiduSecretKey}`);
                    const tokenData = await tokenResp.json();
                    const accessToken = tokenData.access_token;
                    
                    // Convert base64 to binary
                    const base64Data = imageData.split(',')[1];
                    
                    // Call OCR API
                    const ocrResp = await fetch(`https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic?access_token=${accessToken}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `image=${encodeURIComponent(base64Data)}`
                    });
                    
                    const ocrData = await ocrResp.json();
                    
                    if (ocrData.words_result && ocrData.words_result.length > 0) {
                        const text = ocrData.words_result.map(w => w.words).join('\n');
                        document.getElementById('ocrResult').textContent = text;
                        state.problemText = text;
                    } else {
                        document.getElementById('ocrResult').textContent = '未能识别到文字，请手动输入';
                    }
                } catch (err) {
                    console.error('OCR错误:', err);
                    document.getElementById('ocrResult').textContent = '识别失败，请手动输入题目';
                }
            } else {
                // No Baidu API, show manual input
                document.getElementById('ocrResult').textContent = '请配置百度OCR，或直接手动输入题目';
            }
        }

        function switchInputTab(tab) {
            const ocrBtn = document.getElementById('ocrTabBtn');
            const manualBtn = document.getElementById('manualTabBtn');
            const ocrSection = document.getElementById('ocrSection');
            const manualSection = document.getElementById('manualSection');
            
            if (tab === 'ocr') {
                ocrBtn.classList.add('active');
                manualBtn.classList.remove('active');
                ocrSection.classList.remove('hidden');
                manualSection.classList.add('hidden');
            } else {
                ocrBtn.classList.remove('active');
                manualBtn.classList.add('active');
                ocrSection.classList.add('hidden');
                manualSection.classList.add('hidden');
            }
        }

        // ========== Analysis & AI ==========
        function startAnalysis() {
            // Get problem text
            const ocrSection = document.getElementById('ocrSection');
            if (!ocrSection.classList.contains('hidden')) {
                state.problemText = document.getElementById('ocrResult').textContent;
            } else {
                state.problemText = document.getElementById('manualInput').value;
            }
            
            if (!state.problemText || state.problemText.includes('请') || state.problemText.includes('识别')) {
                alert('请先输入或识别题目');
                return;
            }
            
            showPage('analysis');
            document.getElementById('problemText').textContent = state.problemText;
            document.getElementById('analysisContent').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            // Call AI to analyze
            analyzeWithAI(state.problemText);
        }

        async function analyzeWithAI(problem) {
            const prompt = `你是一个小学数学老师。请用小学生能听懂的话分析这道数学题，给出：
1. 题目在讲什么（用简单的语言）
2. 需要用到什么知识点
3. 不用方程，用画图/数数/加减乘除的方法怎么解

题目：${problem}

请用温暖、耐心的语气回答，就像在鼓励小朋友一样。`;

            try {
                const response = await callAI(prompt);
                state.analysis = response;
                document.getElementById('analysisContent').textContent = response;
                speak(response);
            } catch (err) {
                document.getElementById('analysisContent').textContent = '分析失败，请检查API设置';
            }
        }

        async function callAI(prompt) {
            const models = {
                deepseek: { name: 'deepseek-chat', url: state.apiUrl },
                openai: { name: 'gpt-4o-mini', url: state.apiUrl },
                qwen: { name: 'qwen-plus', url: state.apiUrl },
                custom: { name: 'gpt-4o-mini', url: state.apiUrl }
            };
            
            const modelInfo = models[state.model] || models.deepseek;
            
            const response = await fetch(`${modelInfo.url}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${state.apiKey}`
                },
                body: JSON.stringify({
                    model: modelInfo.name,
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.7
                })
            });
            
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ========== Guidance ==========
        function startGuidance() {
            showPage('guidance');
            document.getElementById('guidanceProblemText').textContent = state.problemText;
            
            // Generate guidance steps
            generateGuidanceSteps();
        }

        async function generateGuidanceSteps() {
            const prompt = `这道小学数学题，请分3步引导解答：
题目：${state.problemText}

请用苏格拉底式提问，引导小朋友自己思考出答案。每一步都要：
1. 一个小问题
2. 提示思考方向
3. 给出鼓励的话

格式：
第1步：[步骤名]
问题：[引导问题]
提示：[给一点点提示]

第2步：...
第3步：...`;

            try {
                const response = await callAI(prompt);
                state.guidanceSteps = parseGuidanceSteps(response);
                state.currentStep = 0;
                renderGuidanceSteps();
            } catch (err) {
                // Use default steps
                state.guidanceSteps = [
                    { title: '理解题意', question: '这道题在问我们什么？', hint: '仔细看看题目中的数字和关键词' },
                    { title: '找规律', question: '这些数字之间有什么关系？', hint: '可以用画图或数数的方法' },
                    { title: '算一算', question: '现在能算出答案了吗？', hint: '把找到的规律用计算表示' }
                ];
                renderGuidanceSteps();
            }
        }

        function parseGuidanceSteps(text) {
            const steps = [];
            const stepMatches = text.match(/第(\d)步[:：]([\s\S]*?)(?=第\d步|$)/g);
            
            if (stepMatches) {
                stepMatches.forEach(match => {
                    const titleMatch = match.match(/[:：](.*?)[\n]/);
                    const questionMatch = match.match(/问题[:：](.*?)(?=提示|$)/);
                    const hintMatch = match.match(/提示[:：](.*)/);
                    
                    if (titleMatch) {
                        steps.push({
                            title: titleMatch[1].trim(),
                            question: questionMatch ? questionMatch[1].trim() : '你能想到什么？',
                            hint: hintMatch ? hintMatch[1].trim() : '再想想看'
                        });
                    }
                });
            }
            
            if (steps.length < 3) {
                steps.push(
                    { title: '理解题意', question: '这道题在问我们什么？', hint: '仔细看看题目中的数字' },
                    { title: '找方法', question: '应该怎么算呢？', hint: '可以用画图帮忙' },
                    { title: '算答案', question: '现在能算出答案了吗？', hint: '把数字加起来试试' }
                );
            }
            
            return steps.slice(0, 3);
        }

        function renderGuidanceSteps() {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';
            
            state.guidanceSteps.forEach((step, i) => {
                const card = document.createElement('div');
                card.className = `step-card ${i < state.currentStep ? 'completed' : ''} ${i === state.currentStep ? 'active' : ''}`;
                card.innerHTML = `
                    <span class="step-number">${i + 1}</span>
                    <strong>${step.title}</strong>
                    ${i === state.currentStep ? `<p style="margin-top: 8px;">${step.question}</p>` : ''}
                `;
                container.appendChild(card);
            });
            
            // Show welcome message
            if (state.currentStep === 0) {
                addMessage('ai', `小朋友，你好！🎉 这道题我们来一起想想。${state.guidanceSteps[0].question}`);
                speak(state.guidanceSteps[0].question);
            }
        }

        function addMessage(type, content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="message-avatar">${type === 'ai' ? '🧠' : '👤'}</div>
                <div class="message-content">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function handleUserAnswer(answer) {
            addMessage('user', answer);
            
            // Simple evaluation (in real app, use AI)
            const correctIndicators = ['对', '是的', '正确', '等于', '答案'];
            const isLikelyCorrect = correctIndicators.some(w => answer.includes(w));
            
            if (isLikelyCorrect || answer.length > 5) {
                addMessage('ai', `太棒了！👍 你说得很好！`);
                speak('太棒了！你说得很好！');
                
                setTimeout(() => {
                    nextStep();
                }, 1500);
            } else {
                getHint();
            }
        }

        function submitTextAnswer() {
            const input = document.getElementById('textInput');
            const answer = input.value.trim();
            if (answer) {
                handleUserAnswer(answer);
                input.value = '';
            }
        }

        function getHint() {
            const currentStep = state.guidanceSteps[state.currentStep];
            state.hintLevel++;
            
            let hint = currentStep.hint;
            if (state.hintLevel > 1) {
                hint = '没关系，我们再想想。如果把题目分成更小的部分...';
            }
            
            addMessage('ai', `💡 ${hint}`);
            speak(hint);
        }

        function nextStep() {
            state.currentStep++;
            state.hintLevel = 0;
            
            if (state.currentStep >= state.guidanceSteps.length) {
                finishGuidance();
                return;
            }
            
            renderGuidanceSteps();
            
            const nextQ = state.guidanceSteps[state.currentStep];
            addMessage('ai', `第${state.currentStep + 1}步完成啦！🎉\n\n${nextQ.question}`);
            speak(nextQ.question);
        }

        function finishGuidance() {
            // Save to session data
            state.sessionData.problems.push(state.problemText);
            state.sessionData.knowledgePoints.push(extractKnowledgePoints(state.analysis));
            
            showPage('summary');
            document.getElementById('summaryContent').textContent = state.analysis;
            speak('太棒了！你完成了一道数学题！');
        }

        function extractKnowledgePoints(analysis) {
            const points = [];
            const keywords = ['加法', '减法', '乘法', '除法', '分数', '小数', '图形', '应用题', '规律', '计算'];
            keywords.forEach(k => {
                if (analysis.includes(k)) points.push(k);
            });
            return points.length > 0 ? points : ['数学思维'];
        }

        // ========== Weakness Report ==========
        function showWeaknessReport() {
            showPage('weakness');
            
            const total = state.sessionData.problems.length;
            document.getElementById('totalProblems').textContent = total;
            document.getElementById('correctRate').textContent = '100%';
            
            const points = state.sessionData.knowledgePoints.flat();
            const uniquePoints = [...new Set(points)];
            
            document.getElementById('knowledgePoints').innerHTML = uniquePoints.map(p => 
                `<div class="tip">📚 ${p}</div>`
            ).join('');
            
            document.getElementById('suggestions').innerHTML = `
                <div class="tip success">
                    💪 坚持练习，你一定会越来越棒！
                </div>
            `;
        }

        // ========== Session Storage ==========
        function saveSession() {
            localStorage.setItem('mathmate_session', JSON.stringify(state.sessionData));
        }

        function loadSession() {
            const saved = localStorage.getItem('mathmate_session');
            if (saved) {
                state.sessionData = JSON.parse(saved);
            }
        }

        loadSession();
    </script>
</body>
</html>
